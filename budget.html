<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Dự Toán Chi Phí Đi Sinh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="back-link"><a href="index.html">← Về trang chủ</a></div>
        <h1>Dự Toán Chi Phí Đi Sinh</h1>

        <div class="section">
            <label>Phương thức sinh:</label>
            <select id="surgerySelect"></select>
            <div class="price-detail">Giá dịch vụ kỹ thuật: <span id="surgeryPrice">0 VND</span></div>
        </div>

        <div class="section">
            <label>Chọn phòng hậu sản:</label>
            <select id="roomSelect"></select>
            <div class="stay-days" id="stayDaysGroup">
                <button class="stay-btn" data-days="3">3 ngày</button>
                <button class="stay-btn active" data-days="4">4 ngày</button>
                <button class="stay-btn" data-days="5">5 ngày</button>
            </div>
            <div class="price-detail">Giá phòng (mỗi ngày): <span id="roomPriceDaily">0 VND</span></div>
            <div class="price-detail">Tổng tiền phòng: <span id="roomPriceTotal">0 VND</span></div>
        </div>

        <div class="section">
            <label>Chi phí dịch vụ khác</label>
            <div id="otherServices"></div>
            <div class="price-detail">Tổng chi phí khác: <span id="otherTotal">0 VND</span></div>
            <button class="bhyt-btn active" id="bhytBtn">Sử dụng BHYT (80%)</button>
        </div>

        <div class="total-display">
            <h2>TỔNG</h2>
            <h2 id="finalAmount">0 VND</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

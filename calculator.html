<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator-styles.css">
    <title>Maternity Cost Calculator</title>
</head>
<body>
    <div class="calculator">
        <h1>Maternity Cost Calculator</h1>
        <label for="numVisits">Number of Doctor Visits:</label>
        <input type="number" id="numVisits" value="1" min="1">

        <label for="costPerVisit">Cost per Visit:</label>
        <input type="number" id="costPerVisit" value="100" min="0">

        <label for="numTests">Number of Additional Tests:</label>
        <input type="number" id="numTests" value="1" min="0">

        <button id="calculateBtn">Calculate</button>
        <h2>Total Cost: $<span id="totalCost">0</span></h2>
    </div>
    <script src="calculator-script.js"></script>
</body>
</html>
